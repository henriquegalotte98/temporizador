<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temporizador</title>
</head>

<body>
    <header>
        <h1>Temporizador</h1>
    </header>

    <main>
        <section>

        </section>
    </main>

</body>
